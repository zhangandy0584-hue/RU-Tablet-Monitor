<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>俄区平板情报中心 V25</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .meta { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #5f6368; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .price { color: #d93025; font-weight: bold; }
        .brand-tag { background: #e8f0fe; color: #1a73e8; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RU Tablet Intelligence Center <small>V25.0</small></h1>
        <div id="meta" class="meta">正在连接远程情报库...</div>
        <table>
            <thead>
                <tr><th>品牌</th><th>规格 (SKU)</th><th>实时底价 (RUB)</th></tr>
            </thead>
            <tbody id="content"></tbody>
        </table>
    </div>
    <script>
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                document.getElementById('meta').innerText = `情报来源: Google SERP Snapshot | 最后同步: ${data.update} | 监测 SKU: ${data.sku_count}`;
                const html = data.items.map(i => `
                    <tr>
                        <td><span class="brand-tag">${i.brand}</span></td>
                        <td>${i.spec}</td>
                        <td class="price">${i.best.toLocaleString()} ₽</td>
                    </tr>
                `).join('');
                document.getElementById('content').innerHTML = html;
            }).catch(e => {
                document.getElementById('meta').innerText = "数据同步中，请稍后刷新...";
            });
    </script>
</body>
</html>
