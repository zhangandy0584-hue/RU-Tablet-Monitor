<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RU Market Intelligence Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-blue-600 text-xl italic">RU.DATA MONITOR V10</h1>
            <div id="sync-status" class="text-xs text-slate-400 font-mono italic">等待同步...</div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-800 text-white uppercase text-[10px] tracking-widest">
                    <tr>
                        <th class="p-4">品牌 & 型号</th>
                        <th class="p-4">DNS Shop (RUB)</th>
                        <th class="p-4">状态</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        fetch('./data.json').then(res => res.json()).then(data => {
            document.getElementById('sync-status').innerText = '● 最后更新: ' + data.last_update;
            const table = document.getElementById('data-table');
            table.innerHTML = data.items.map(item => `
                <tr class="hover:bg-blue-50 transition-colors">
                    <td class="p-4 font-bold text-slate-700">
                        <span class="text-blue-500 text-[10px] block">${item.brand}</span>
                        ${item.model}
                    </td>
                    <td class="p-4 font-black text-blue-600 text-lg">${item.dns.toLocaleString()} ₽</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full bg-green-100 text-green-700 text-[10px] font-bold">在售</span></td>
                </tr>
            `).join('');
        }).catch(err => {
            document.getElementById('sync-status').innerText = '❌ 数据尚未生成，请运行一次 Action';
        });
    </script>
</body>
</html>
