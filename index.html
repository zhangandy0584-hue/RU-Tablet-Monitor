<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RU Tablet Intelligence Command Center V20</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-blue-500 italic tracking-tighter uppercase">RU.DATA COMMAND V20</h1>
                <p class="text-slate-500 text-[10px] mt-1 font-mono uppercase">DNS / M.Video / Citilink / OZON / WB / Yandex / Price.ru</p>
            </div>
            <div id="sync-info" class="bg-slate-900 border border-slate-700 px-4 py-2 rounded text-xs font-mono text-green-400">SYNCING...</div>
        </header>

        <div class="bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl overflow-x-auto">
            <table class="w-full text-left text-sm border-collapse">
                <thead class="bg-slate-800/50 text-slate-500 text-[9px] font-bold uppercase tracking-widest">
                    <tr>
                        <th class="p-5 border-b border-slate-800">SKU & 配置</th>
                        <th class="p-4 text-center border-b border-slate-800">DNS</th>
                        <th class="p-4 text-center border-b border-slate-800">M.Video</th>
                        <th class="p-4 text-center border-b border-slate-800">Citilink</th>
                        <th class="p-4 text-center border-b border-slate-800 text-orange-400">OZON/WB</th>
                        <th class="p-4 text-center border-b border-slate-800 text-yellow-500">比价网参考</th>
                        <th class="p-4 text-right border-b border-slate-800">核定低价</th>
                    </tr>
                </thead>
                <tbody id="data-grid" class="divide-y divide-slate-800">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        fetch('./data.json').then(r => r.json()).then(data => {
            document.getElementById('sync-info').innerText = 'LAST SYNC: ' + data[0].update;
            const container = document.getElementById('data-grid');
            container.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-800/40 transition-colors group">
                    <td class="p-5 border-l-4 ${item.status.includes('✅') ? 'border-green-500' : 'border-amber-500'}">
                        <div class="font-black text-white group-hover:text-blue-400 transition-colors">${item.brand} ${item.model}</div>
                        <div class="text-[10px] text-slate-500 font-mono mt-0.5">${item.spec}</div>
                        <div class="text-[9px] mt-1.5 px-1.5 py-0.5 bg-slate-800 inline-block rounded italic text-slate-400">${item.status}</div>
                    </td>
                    <td class="p-4 text-center font-mono">${item.prices.dns?.toLocaleString() || '--'}</td>
                    <td class="p-4 text-center font-mono">${item.prices.mvideo?.toLocaleString() || '--'}</td>
                    <td class="p-4 text-center font-mono">${item.prices.citilink?.toLocaleString() || '--'}</td>
                    <td class="p-4 text-center font-mono text-orange-300">${(item.prices.ozon || item.prices.wildberries || '--').toLocaleString()}</td>
                    <td class="p-4 text-center font-mono text-yellow-500 italic">${item.prices.fallback?.toLocaleString() || item.prices.fallback_market?.toLocaleString() || '--'}</td>
                    <td class="p-4 text-right font-black text-blue-400 text-xl tracking-tighter">${item.best_price.toLocaleString()} ₽</td>
                </tr>
            `).join('');
        });
    </script>
</body>
</html>
