<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RU Tablet Monitor V20</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #003366; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .price { color: #d32f2f; font-weight: bold; }
        .tag { background: #e3f2fd; color: #0d47a1; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>莫斯科平板市场行情 (V20.0)</h2>
        <p id="info">正在获取最新情报...</p>
        <table>
            <thead><tr><th>品牌</th><th>型号</th><th>配置</th><th>底价 (RUB)</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script>
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                document.getElementById('info').innerText = `最后同步: ${data.update} | 监控中: ${data.sku_count}`;
                const html = data.items.map(i => `
                    <tr>
                        <td><span class="tag">${i.brand}</span></td>
                        <td>${i.model}</td>
                        <td>${i.spec}</td>
                        <td class="price">${i.best.toLocaleString()} ₽</td>
                    </tr>
                `).join('');
                document.getElementById('list').innerHTML = html;
            });
    </script>
</body>
</html>
