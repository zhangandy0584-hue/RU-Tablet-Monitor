<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莫斯科平板战情中心 V23</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .brand { font-weight: bold; color: #1a73e8; }
        .price { color: #d93025; font-weight: bold; }
        .sync-info { font-size: 0.8em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>RU Market Monitor <small>V23.0</small></h2>
        <div id="status" class="sync-info">正在获取最新情报...</div>
        <table>
            <thead>
                <tr><th>品牌</th><th>规格</th><th>市场参考价 (RUB)</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script>
        // 加入随机参数防止缓存
        fetch('data.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => {
                document.getElementById('status').innerText = `最后同步: ${data.update} | SKU总数: ${data.sku_count}`;
                const tbody = document.getElementById('list');
                tbody.innerHTML = data.items.map(item => `
                    <tr>
                        <td class="brand">${item.brand}</td>
                        <td>${item.spec}</td>
                        <td class="price">${item.best.toLocaleString()} ₽</td>
                    </tr>
                `).join('');
            }).catch(() => {
                document.getElementById('status').innerText = "暂无数据，请先运行 Actions 任务。";
            });
    </script>
</body>
</html>
