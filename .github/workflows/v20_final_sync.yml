name: RU Market Auto-Sync V20
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Deps
        run: pip install requests
      - name: Run Scraper
        timeout-minutes: 60
        run: python scraper.py
      - name: Sync
        run: |
          git config --global user.name "DragonMap-Bot"
          git config --global user.email "bot@dragonmap.ai"
          git add data.json
          git commit -m "V20 Sync: $(date)" || echo "No changes"
          git push origin main
