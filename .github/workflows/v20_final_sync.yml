name: RU Market Auto-Sync V20

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: pip install requests

      - name: 4. Run V20 Engine
        run: python scraper.py

      - name: 5. Sync Data
        run: |
          git config --global user.name "DragonMap-Bot"
          git config --global user.email "bot@dragonmap.ai"
          git add data.json
          # 强制提交，记录当前的俄罗斯市场数据时间戳
          git commit -m "V20 Data Update: $(date)" || echo "No changes to commit"
          # 显式推送到 main 分支
          git push origin main
