name: RU Market Auto-Sync V23

on:
  workflow_dispatch: # 支持手动点火
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午10点自动运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests
      - name: 启动穿透引擎
        continue-on-error: true # 关键：即使某个品牌失败也不中断流程
        run: python scraper.py
      - name: 情报回传仓库
        run: |
          git config --global user.name "Market-Bot"
          git config --global user.email "bot@market.ru"
          git add data.json
          git commit -m "V23 Sync Update" || echo "No changes"
          git push origin main
