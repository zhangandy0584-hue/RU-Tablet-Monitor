name: RU Market Auto-Sync V20

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自动点火一次，同步莫斯科早盘价
  workflow_dispatch:     # 保留手动点火按钮

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v3

      - name: 2. 部署 Python 3.10 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装爬虫引擎依赖
        run: pip install requests

      - name: 4. 启动 V20 穿透引擎
        timeout-minutes: 90 # 给俄区反爬对抗留足缓冲时间
        run: python scraper.py

      - name: 5. 自动同步情报至仓库
        run: |
          git config --global user.name "DragonMap-Bot"
          git config --global user.email "bot@dragonmap.ai"
          git add data.json
          # 即使数据无变化也强制提交时间戳
          git commit -m "V20 Intelligence Sync: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push origin main
